version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: game-5inline-service:latest
    ports:
      - "${APP_PORT}:8090"
    env_file:
      - .env
    environment:
      # Inyecta las variables de RabbitMQ en formato que Spring Boot reconoce.
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      # Opcional: perfil de Spring
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      # Puedes pasar JAVA_OPTS si necesitas ajustar memoria, etc.
      - JAVA_OPTS=${JAVA_OPTS}
    restart: unless-stopped
    # No definimos servicio de rabbitmq aquí: asumimos que es un servicio externo accesible
    # Puedes conectar en la variable RABBITMQ_HOST a host.docker.internal si Rabbit corre en tu máquina local.
